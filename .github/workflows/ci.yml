name: CI
run-name: "${{ github.event_name == 'workflow_dispatch' && format('CI manual ({0})', github.ref_name) || github.event_name == 'pull_request' && format('CI PR #{0} ({1})', github.event.pull_request.number, github.head_ref) || format('CI push ({0})', github.ref_name) }}"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium
