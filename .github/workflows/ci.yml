name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci-verify:
    name: ci-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:ci
      - name: Cache responsive images
        uses: actions/cache@v4
        with:
          path: apps/web/public/images
          key: ${{ runner.os }}-responsive-images-${{ hashFiles('apps/web/image-sources/**', 'apps/web/scripts/generate-responsive-images.mjs', 'apps/web/scripts/responsive-image-cache.mjs', 'apps/web/scripts/responsive-image-config.mjs', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-responsive-images-
      - run: npm run build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-
      - run: npx playwright install-deps chromium
      - run: npx playwright install chromium
      - run: npm run test:e2e -- --project=chromium --reporter=line,junit,html
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: reports/playwright-junit.xml
      - name: Write test and coverage summary
        if: ${{ always() }}
        run: npm run report:ci
      - name: Upload test and coverage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-and-coverage-reports
          path: |
            coverage/
            reports/
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
