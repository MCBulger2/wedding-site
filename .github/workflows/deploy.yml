name: Deploy
run-name: ${{ github.event_name == 'workflow_run' && format('Deploy {0} from CI #{1} ({2})', github.event.workflow_run.head_branch == 'main' && 'production' || 'staging', github.event.workflow_run.run_number, github.event.workflow_run.head_branch) || format('Deploy {0} manually ({1})', github.ref_name == 'main' && 'production' || 'staging', github.ref_name) }}

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - develop
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy_from_ci:
    name: Deploy ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }} from CI #${{ github.event.workflow_run.run_number }}
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
    env:
      APP_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
      API_DOMAIN_NAME: ${{ vars.API_DOMAIN_NAME }}
      AUTH_DOMAIN_NAME: ${{ vars.AUTH_DOMAIN_NAME }}
      FRONTEND_DOMAIN_NAME: ${{ vars.FRONTEND_DOMAIN_NAME }}
      HOSTED_ZONE_DOMAIN: ${{ vars.HOSTED_ZONE_DOMAIN }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
      NOTIFICATION_SENDER_EMAIL: ${{ vars.NOTIFICATION_SENDER_EMAIL }}
      NOTIFICATION_RECIPIENT_EMAILS: ${{ vars.NOTIFICATION_RECIPIENT_EMAILS }}
      ENABLE_PASSKEYS: ${{ vars.ENABLE_PASSKEYS }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm run check:cdk-bootstrap
      - run: npm run ${{ github.event.workflow_run.head_branch == 'main' && 'deploy:infra:production' || 'deploy:infra:staging' }} -- --require-approval never

  deploy_manual:
    name: Deploy ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }} manually from ${{ github.ref_name }}
    if: github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    env:
      APP_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
      API_DOMAIN_NAME: ${{ vars.API_DOMAIN_NAME }}
      AUTH_DOMAIN_NAME: ${{ vars.AUTH_DOMAIN_NAME }}
      FRONTEND_DOMAIN_NAME: ${{ vars.FRONTEND_DOMAIN_NAME }}
      HOSTED_ZONE_DOMAIN: ${{ vars.HOSTED_ZONE_DOMAIN }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
      NOTIFICATION_SENDER_EMAIL: ${{ vars.NOTIFICATION_SENDER_EMAIL }}
      NOTIFICATION_RECIPIENT_EMAILS: ${{ vars.NOTIFICATION_RECIPIENT_EMAILS }}
      ENABLE_PASSKEYS: ${{ vars.ENABLE_PASSKEYS }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm run check:cdk-bootstrap
      - run: npm run ${{ github.ref == 'refs/heads/main' && 'deploy:infra:production' || 'deploy:infra:staging' }} -- --require-approval never
