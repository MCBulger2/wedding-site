<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Wedding details and private RSVP for Matt and Alison's January 18, 2027 celebration in Mesa, Arizona."
    />
    <meta name="application-name" content="Matt &amp; Alison" />
    <meta name="theme-color" content="#0f513f" />
    <meta property="og:site_name" content="Matt &amp; Alison's Wedding" />
    <meta property="og:title" content="Matt &amp; Alison's Wedding" />
    <meta
      property="og:description"
      content="Wedding details and private RSVP for Matt and Alison's January 18, 2027 celebration in Mesa, Arizona."
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="preload"
      as="image"
      href="/images/hero-wedding-960.avif"
      type="image/avif"
      imagesrcset="/images/hero-wedding-960.avif 1x, /images/hero-wedding-1920.avif 2x"
      fetchpriority="high"
    />
    <script>
      (() => {
        let theme = 'light';

        try {
          const storageKey = 'wedding.theme';
          const storedTheme = window.localStorage.getItem(storageKey);
          theme =
            storedTheme === 'light' || storedTheme === 'dark'
              ? storedTheme
              : window.matchMedia?.('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
        } catch {
          theme = 'light';
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <title>Matt &amp; Alison&apos;s Wedding</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
